<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Tetris Clone</title>
    <style>
        :root {
            --bg-color: #202028;
            --grid-color: #333;
            --text-color: #fff;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }
        #game-container { position: relative; }
        canvas {
            border: 4px solid #fff;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .stats {
            position: absolute;
            top: 0;
            right: -120px;
            text-align: left;
        }
        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 60px);
            gap: 10px;
        }
        button {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            border: none;
            background: #444;
            color: white;
            font-size: 20px;
            touch-action: manipulation;
        }
        button:active { background: #666; }
        .btn-wide { grid-column: span 3; width: 200px; height: 50px; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="tetris" width="240" height="400"></canvas>
        <div class="stats">
            <div>Score: <span id="score">0</span></div>
            <div>Level: <span id="level">1</span></div>
        </div>
    </div>

    <div class="controls">
        <button onclick="playerRotate()">↻</button>
        <button onclick="playerMove(0, -1)">↑</button> <div></div>
        <button onclick="playerMove(-1, 0)">←</button>
        <button onclick="playerDrop()">↓</button>
        <button onclick="playerMove(1, 0)">→</button>
        <button class="btn-wide" onclick="playerHardDrop()">HARD DROP</button>
    </div>
